<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pogoda u Andrzeja</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 20px; background-color: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; margin: 10px auto; max-width: 400px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .emoji { font-size: 50px; margin: 10px 0; }
        .title { font-size: 20px; font-weight: bold; color: #333; }
        .details { font-size: 14px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Raport: Gdańsk vs Warszawa</h2>

    <div class="card" id="temp-card">
        <div class="title">Temperatura</div>
        <div class="details" id="temp-details">Ładowanie...</div>
        <div class="emoji" id="temp-emoji">⏳</div>
        <div id="temp-text">Sprawdzam...</div>
    </div>

    <div class="card" id="wind-card">
        <div class="title">Wiatr</div>
        <div class="details" id="wind-details">Ładowanie...</div>
        <div class="emoji" id="wind-emoji">⏳</div>
        <div id="wind-text">Sprawdzam...</div>
    </div>

    <div class="card" id="rain-card">
        <div class="title">Opady (Deszcz)</div>
        <div class="details" id="rain-details">Ładowanie...</div>
        <div class="emoji" id="rain-emoji">⏳</div>
        <div id="rain-text">Sprawdzam...</div>
    </div>

    <script>
        async function fetchWeather() {
            const urlGdansk = "https://api.open-meteo.com/v1/forecast?latitude=54.35&longitude=18.64&current=temperature_2m,precipitation,wind_speed_10m";
            const urlWarsaw = "https://api.open-meteo.com/v1/forecast?latitude=52.23&longitude=21.01&current=temperature_2m,precipitation,wind_speed_10m";

            try {
                const [resGdansk, resWarsaw] = await Promise.all([fetch(urlGdansk), fetch(urlWarsaw)]);
                const dataGdansk = await resGdansk.json();
                const dataWarsaw = await resWarsaw.json();

                const gdansk = dataGdansk.current;
                const warsaw = dataWarsaw.current;

                // --- 1. LOGIKA TEMPERATURY (Im mniej, tym zimniej/gorzej) ---
                const diffTemp = Math.abs((warsaw.temperature_2m - gdansk.temperature_2m).toFixed(1));
                let tempEmoji, tempText;
                
                if (warsaw.temperature_2m > gdansk.temperature_2m) {
                    tempEmoji = "😢";
                    tempText = `U Andrzeja jest cieplej o ${diffTemp} stopni`;
                } else if (warsaw.temperature_2m === gdansk.temperature_2m) {
                    tempEmoji = "😐";
                    tempText = "Andrzej ma tak samo";
                } else {
                    tempEmoji = "😃";
                    tempText = "Andrzej ma gorzej";
                }
                document.getElementById('temp-emoji').innerText = tempEmoji;
                document.getElementById('temp-text').innerText = tempText;
                document.getElementById('temp-details').innerText = `Gdańsk: ${gdansk.temperature_2m}°C | Warszawa: ${warsaw.temperature_2m}°C`;

                // --- 2. LOGIKA WIATRU (Im więcej wieje, tym gorzej) ---
                const diffWind = Math.abs((warsaw.wind_speed_10m - gdansk.wind_speed_10m).toFixed(1));
                let windEmoji, windText;

                if (warsaw.wind_speed_10m > gdansk.wind_speed_10m) {
                    windEmoji = "😃"; // W Wawie wieje mocniej -> Andrzej ma gorzej -> cieszymy się
                    windText = "Andrzej ma gorzej";
                } else if (warsaw.wind_speed_10m === gdansk.wind_speed_10m) {
                    windEmoji = "😐";
                    windText = "Andrzej ma tak samo";
                } else {
                    windEmoji = "😢"; // W Wawie wieje mniej -> Andrzej ma lepiej -> płaczemy
                    windText = `U Andrzeja wieje mniej o ${diffWind} km/h`;
                }
                document.getElementById('wind-emoji').innerText = windEmoji;
                document.getElementById('wind-text').innerText = windText;
                document.getElementById('wind-details').innerText = `Gdańsk: ${gdansk.wind_speed_10m} km/h | Warszawa: ${warsaw.wind_speed_10m} km/h`;

                // --- 3. LOGIKA OPADÓW (Im więcej pada, tym gorzej) ---
                const diffRain = Math.abs((warsaw.precipitation - gdansk.precipitation).toFixed(1));
                let rainEmoji, rainText;

                if (warsaw.precipitation > gdansk.precipitation) {
                    rainEmoji = "😃"; // W Wawie pada mocniej -> Andrzej ma gorzej -> cieszymy się
                    rainText = "Andrzej ma gorzej";
                } else if (warsaw.precipitation === gdansk.precipitation) {
                    rainEmoji = "😐";
                    rainText = "Andrzej ma tak samo";
                } else {
                    rainEmoji = "😢"; // W Wawie pada mniej -> Andrzej ma lepiej -> płaczemy
                    rainText = `U Andrzeja mniej pada o ${diffRain} mm`;
                }
                document.getElementById('rain-emoji').innerText = rainEmoji;
                document.getElementById('rain-text').innerText = rainText;
                document.getElementById('rain-details').innerText = `Gdańsk: ${gdansk.precipitation} mm | Warszawa: ${warsaw.precipitation} mm`;

            } catch (error) {
                console.error("Błąd pobierania danych", error);
                document.getElementById('temp-text').innerText = "Błąd połączenia";
            }
        }

        fetchWeather();
    </script>

</body>
</html>
